<!DOCTYPE html>

<head>

    <!--

        id="sigmachat-script"
        src="https://script.sigmachat.com.br/webchat.js?token=wN7tZgOlxvN9OrLo&version=v1"

        data-sigmachat-btn-color="#153861"
        data-sigmachat-btn-text-color="#fff"
        data-sigmachat-btn-effect="true"
      ></script>
      
      ❌ PROBLEMAS:
      - Token exposto na URL (visível no código-fonte)
      - URL do webhook exposta
      - Sem expiração de token
      - Sem CORS protection
      - Qualquer pessoa pode ver o token nas DevTools
      ═══════════════════════════════════════════════════════════════════════════
    -->
    
    <style>
        /* Loading state - esconde flash de conteúdo */
        #gvc-loading {
            position: fixed;
            inset: 0;
            background: #F0F2F5;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99998;
            transition: opacity 0.3s;
        }
        #gvc-loading.done {
            opacity: 0;
            pointer-events: none;
        }
        .gvc-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #E8ECF0;
            border-top-color: #1B3A5C;
            border-radius: 50%;
            animation: gvcSpin 0.8s linear infinite;
        }
        @keyframes gvcSpin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Loading indicator -->
    <div id="gvc-loading">
        <div class="gvc-spinner"></div>
    </div>

    <!-- 
      ═══════════════════════════════════════════════════════════════════════════
      VERSÃO SEGURA: Usa iframe como intermediário
      
      O iframe carrega o Secure Wrapper que:
      1. Obtém token de forma segura via backend
      2. Carrega o SigmaChat sem expor credenciais
      3. Gerencia lifecycle do token automaticamente
      ═══════════════════════════════════════════════════════════════════════════
    -->
    <iframe
        id="gvc-secure-frame"
        src="chatgvc-secure-wrapper.html"
        style="position:fixed; bottom:0; right:0; width:420px; height:650px; border:none; z-index:9999; box-shadow: 0 8px 32px rgba(0,0,0,0.2);"
        allow="clipboard-write"
        title="Chat GVC - Assistente de Treinamento"
        loading="lazy"
    ></iframe>

    <!--

      Esta versão carrega o wrapper via JavaScript, mas ainda mantém o token
      oculto porque ele é obtido internamente pelo SecureTokenManager.
      
      Para usar esta alternativa, comente o iframe acima e descomente este script.
      ═══════════════════════════════════════════════════════════════════════════
    -->

    <!-- Esconder loading quando iframe carregar -->
    <script>
    (function() {
        var iframe = document.getElementById('gvc-secure-frame');
        var loading = document.getElementById('gvc-loading');
        
        if (iframe && loading) {
            // Se iframe carregar em 3 segundos, esconder loading
            var timeout = setTimeout(function() {
                loading.classList.add('done');
            }, 3000);
            
            iframe.addEventListener('load', function() {
                clearTimeout(timeout);
                loading.classList.add('done');
            });
        }
    })();
    </script>

</body>
