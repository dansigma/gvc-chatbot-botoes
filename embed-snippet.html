<!-- OPÇÃO 1: Embed via Iframe (RECOMENDADO) -->
<!-- 
  Esta é a forma mais segura - o wrapper é carregado em um contexto isolado
  e nenhuma informação sensível é acessível ao site hospedeiro.
-->
<iframe
  src="https://SEU-DOMINIO.com/secure-wrapper/chatgvc-secure-wrapper.html"
  style="position: fixed; bottom: 0; right: 0; width: 420px; height: 650px; border: none; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,0.2);"
  allow="clipboard-write"
  title="Chat GVC - Assistente de Treinamento"
  loading="lazy"
></iframe>
